name: Deploy Policy Processor Function

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PolicyProcessor/PolicyProcessor.csproj

      - name: Build
        run: dotnet build PolicyProcessor/PolicyProcessor.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish PolicyProcessor/PolicyProcessor.csproj -c Release -o publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: policyprocessor-nizam-dev
          package: publish